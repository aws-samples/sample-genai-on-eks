
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: rag
  labels:
    app: rag-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      serviceAccountName: rag-service-sa   # Must have S3 Vectors permissions via IRSA
      containers:
        - name: rag-service
          image: python:3.11-slim
          command: ["python", "/app/rag_serve.py"]
          ports:
            - containerPort: 8000
          env:
            - name: S3_VECTOR_BUCKET_NAME
              value: "${S3_VECTOR_BUCKET_NAME}"
            - name: S3_VECTOR_INDEX_NAME
              value: "${S3_VECTOR_INDEX_NAME}"
            - name: MODEL_ID
              value: "${MODEL_ID}"
            - name: MODEL_ENDPOINT
              value: "${MODEL_ENDPOINT}"
            - name: AWS_REGION
              value: "${AWS_REGION}"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: rag-script
              mountPath: /app
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: rag-script
          configMap:
            name: rag-serve-script
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: rag
spec:
  selector:
    app: rag-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
