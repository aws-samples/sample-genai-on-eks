    AARRGGUUMMEENNTTSS
           If arguments remain after option processing, and neither the --cc nor the
           --ss option has been supplied, the first argument is treated as the name
           of a file containing shell commands (a _s_h_e_l_l _s_c_r_i_p_t).  When bbaasshh is
           invoked in this fashion, $$00 is set to the name of the file, and the
           positional parameters are set to the remaining arguments.  BBaasshh reads
           and executes commands from this file, then exits.  BBaasshh's exit status
           is the exit status of the last command executed in the script.  If no
           commands are executed, the exit status is 0.  BBaasshh first attempts to
           open the file in the current directory, and, if no file is found,
           searches the directories in PPAATTHH for the script.
    
    IINNVVOOCCAATTIIOONN
           A _l_o_g_i_n _s_h_e_l_l is one whose first character of argument zero is a --, or
           one started with the ----llooggiinn option.
    
           An _i_n_t_e_r_a_c_t_i_v_e _s_h_e_l_l is one started without non-option arguments
           (unless --ss is specified) and without the --cc option, and whose standard
           input and standard error are both connected to terminals (as determined
           by _i_s_a_t_t_y(3)), or one started with the --ii option.  BBaasshh sets PPSS11 and $$--
           includes ii if the shell is interactive, so a shell script or a startup
           file can test this state.
    
           The following paragraphs describe how bbaasshh executes its startup files.
           If any of the files exist but cannot be read, bbaasshh reports an error.
           Tildes are expanded in filenames as described below under TTiillddee
           EExxppaannssiioonn in the EEXXPPAANNSSIIOONN section.
    
           When bbaasshh is invoked as an interactive login shell, or as a non-
           interactive shell with the ----llooggiinn option, it first reads and executes
           commands from the file _/_e_t_c_/_p_r_o_f_i_l_e, if that file exists.  After
           reading that file, it looks for _~_/_._b_a_s_h___p_r_o_f_i_l_e, _~_/_._b_a_s_h___l_o_g_i_n, and
           _~_/_._p_r_o_f_i_l_e, in that order, and reads and executes commands from the
           first one that exists and is readable.  The ----nnoopprrooffiillee option may be
           used when the shell is started to inhibit this behavior.
    
           When an interactive login shell exits, or a non-interactive login shell
           executes the eexxiitt builtin command, bbaasshh reads and executes commands
           from the file _~_/_._b_a_s_h___l_o_g_o_u_t, if it exists.
    
           When an interactive shell that is not a login shell is started, bbaasshh
           reads and executes commands from _~_/_._b_a_s_h_r_c, if that file exists.  The
           ----nnoorrcc option inhibits this behavior.  The ----rrccffiillee _f_i_l_e option causes
           bbaasshh to use _f_i_l_e instead of _~_/_._b_a_s_h_r_c.
    
           When bbaasshh is started non-interactively, to run a shell script, for
           example, it looks for the variable BBAASSHH__EENNVV in the environment, expands
           its value if it appears there, and uses the expanded value as the name
           of a file to read and execute.  BBaasshh behaves as if the following
           command were executed:
    
    	      if [ -n "$BASH_ENV" ]; then . "$BASH_ENV"; fi
    
           but does not use the value of the PPAATTHH variable to search for the
           filename.
    
           If bbaasshh is invoked with the name sshh, it tries to mimic the startup
           behavior of historical versions of sshh as closely as possible, while
           conforming to the POSIX standard as well.  When invoked as an
           interactive login shell, or a non-interactive shell with the ----llooggiinn
           option, it first attempts to read and execute commands from
           _/_e_t_c_/_p_r_o_f_i_l_e and _~_/_._p_r_o_f_i_l_e, in that order.  The ----nnoopprrooffiillee option
           inhibits this behavior.	When invoked as an interactive shell with the
           name sshh, bbaasshh looks for the variable EENNVV, expands its value if it is
           defined, and uses the expanded value as the name of a file to read and
           execute.  Since a shell invoked as sshh does not attempt to read and
           execute commands from any other startup files, the ----rrccffiillee option has
           no effect.  A non-interactive shell invoked with the name sshh does not
           attempt to read any other startup files.
    
           When invoked as sshh, bbaasshh enters posix mode after reading the startup
           files.
    
           When bbaasshh is started in posix mode, as with the ----ppoossiixx command line
           option, it follows the POSIX standard for startup files.  In this mode,
           interactive shells expand the EENNVV variable and read and execute
           commands from the file whose name is the expanded value.  No other
           startup files are read.
    
           BBaasshh attempts to determine when it is being run with its standard input
           connected to a network connection, as when executed by the historical
           and rarely-seen remote shell daemon, usually _r_s_h_d, or the secure shell
           daemon _s_s_h_d.  If bbaasshh determines it is being run non-interactively in
           this fashion, it reads and executes commands from _~_/_._b_a_s_h_r_c, if that
           file exists and is readable.  BBaasshh does not read this file if invoked
           as sshh.  The ----nnoorrcc option inhibits this behavior, and the ----rrccffiillee
           option makes bbaasshh use a different file instead of _~_/_._b_a_s_h_r_c, but
           neither _r_s_h_d nor _s_s_h_d generally invoke the shell with those options or
           allow them to be specified.
    
           If the shell is started with the effective user (group) id not equal to
           the real user (group) id, and the --pp option is not supplied, no startup
           files are read, shell functions are not inherited from the environment,
           the SSHHEELLLLOOPPTTSS, BBAASSHHOOPPTTSS, CCDDPPAATTHH, and GGLLOOBBIIGGNNOORREE variables, if they
           appear in the environment, are ignored, and the effective user id is
           set to the real user id.  If the --pp option is supplied at invocation,
           the startup behavior is the same, but the effective user id is not
           reset.
    
