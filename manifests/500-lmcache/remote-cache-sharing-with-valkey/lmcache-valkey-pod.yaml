apiVersion: v1
kind: Pod
metadata:
  name: lmcache-valkey
  labels:
    app: lmcache-valkey
    model: ministral-3-8b
spec:
  serviceAccountName: model-storage-sa
  restartPolicy: Never
  tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
  nodeSelector:
    karpenter.sh/nodepool: gpu
  containers:
  - name: vllm-server
    image: 763104351884.dkr.ecr.us-east-1.amazonaws.com/vllm:0.15.1-gpu-py312-cu129-ubuntu22.04-ec2-v1.1-soci
    imagePullPolicy: IfNotPresent
    command: ["/bin/bash", "-c"]
    args:
    - |
      # LMCache should be pre-installed in this AWS DLC vllm image
      python3 -c "import lmcache; print('lmcache version:', lmcache.__version__)" || pip install --no-cache-dir lmcache==0.3.8 openai

      # Start vllm with LMCache L1 (CPU RAM) + L2 (Valkey remote) offloading
      python3 -m vllm.entrypoints.openai.api_server \
        --port=8080 \
        --model=s3://${S3_BUCKET_NAME}/Ministral-3-8B-Instruct-2512/ \
        --served-model-name=ministral-3-8b-instruct-2512 \
        --load-format=runai_streamer \
        --model-loader-extra-config='{"concurrency":16}' \
        --tokenizer_mode=auto \
        --trust-remote-code \
        --gpu_memory_utilization=0.90 \
        --max-model-len=8192 \
        --tensor-parallel-size=1 \
        --max-num-batched-tokens=8192 \
        --max-num-seqs=256 \
        --block-size=16 \
        --enforce-eager \
        --swap-space=16 \
        --disable-custom-all-reduce \
        --config-format=mistral \
        --enable-auto-tool-choice \
        --tool-call-parser=mistral \
        --kv-transfer-config='{"kv_connector":"LMCacheConnectorV1", "kv_role":"kv_both"}'
    env:
    - name: CUDA_LAUNCH_BLOCKING
      value: "1"
    - name: PYTORCH_CUDA_ALLOC_CONF
      value: "max_split_size_mb:512"
    - name: VLLM_ATTENTION_BACKEND
      value: "FLASHINFER"
    # L1: Local CPU RAM cache
    - name: LMCACHE_CHUNK_SIZE
      value: "256"
    - name: LMCACHE_LOCAL_CPU
      value: "True"
    - name: LMCACHE_MAX_LOCAL_CPU_SIZE
      value: "12.0"
    # L2: Remote Valkey cache (ElastiCache Serverless)
    - name: LMCACHE_REMOTE_URL
      value: "rediss://${VALKEY_ENDPOINT}:6379"
    - name: LMCACHE_REMOTE_SERDE
      value: "naive"
    # Required for cross-pod cache key consistency
    - name: PYTHONHASHSEED
      value: "0"
    ports:
    - containerPort: 8080
      protocol: TCP
      name: http
    volumeMounts:
    - name: test-scripts
      mountPath: /app
    resources:
      requests:
        cpu: 6
        memory: 32Gi
        nvidia.com/gpu: 1
      limits:
        cpu: 6
        memory: 32Gi
        nvidia.com/gpu: 1
    readinessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    livenessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3

  volumes:
  - name: test-scripts
    configMap:
      name: valkey-cm
